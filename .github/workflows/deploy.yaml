name: deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    strategy:
      matrix:
        deck: [tlak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: npm ci
      - run: npx slidev build --base /${{matrix.deck}} ${{matrix.deck}}/slides.md
      - uses: JamesIves/github-pages-deploy-action@6c2d9db40f9296374acc17b90404b6e8864128c8 # v4.7.3
        with:
          folder: ${{matrix.deck}}/dist
          target-folder: ${{matrix.deck}}
